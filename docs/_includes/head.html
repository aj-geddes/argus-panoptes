<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

<!-- SEO -->
{% seo %}

<!-- Canonical -->
<link rel="canonical" href="{{ page.url | absolute_url }}">

<!-- Open Graph Fallback -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">
{% if page.description %}
<meta property="og:description" content="{{ page.description }}">
{% else %}
<meta property="og:description" content="{{ site.description }}">
{% endif %}

<!-- Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Argus Panoptes",
  "description": "{{ site.description }}",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Linux, macOS, Windows",
  "license": "https://www.apache.org/licenses/LICENSE-2.0",
  "author": {
    "@type": "Person",
    "name": "{{ site.author }}"
  },
  "codeRepository": "https://github.com/aj-geddes/argus-panoptes"
}
</script>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23020617'/%3E%3Ccircle cx='16' cy='16' r='8' fill='%2310b981'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%23020617'/%3E%3C/svg%3E">

<!-- JetBrains Mono + Inter -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap">

<!-- Main CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Theme color for browser chrome -->
<meta name="theme-color" content="#020617">
<meta name="color-scheme" content="dark">
