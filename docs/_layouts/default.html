<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {% include head.html %}
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
</head>
<body>

<div class="layout">

  <!-- ===== Header ===== -->
  <header class="site-header" role="banner">
    <a href="{{ '/' | relative_url }}" class="header-brand" aria-label="Argus Panoptes home">
      <div class="header-brand-icon" aria-hidden="true">&#9673;</div>
      <span class="header-brand-name">Argus Panoptes</span>
    </a>

    <nav class="header-nav" aria-label="Header navigation">
      <a href="{{ '/getting-started' | relative_url }}" class="header-link">Docs</a>
      <a href="{{ '/api-reference' | relative_url }}" class="header-link">API</a>
      <a href="https://github.com/aj-geddes/argus-panoptes"
         class="header-link github"
         target="_blank"
         rel="noopener noreferrer"
         aria-label="View on GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        GitHub
      </a>

      <!-- Mobile hamburger -->
      <button class="menu-toggle"
              id="menu-toggle"
              aria-controls="site-sidebar"
              aria-expanded="false"
              aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <!-- ===== Sidebar ===== -->
  {% include nav.html %}

  <!-- ===== Main Content ===== -->
  <main class="site-main" id="main-content" role="main">
    {% if page.path %}
    <div style="display:none;" class="edit-on-github-wrapper">
      <!-- Edit on GitHub link is rendered in _layouts/page.html for each content page -->
      <a href="https://github.com/aj-geddes/argus-panoptes/edit/main/docs/{{ page.path }}"
         class="edit-on-github"
         target="_blank"
         rel="noopener noreferrer">Edit on GitHub</a>
    </div>
    {% endif %}
    {{ content }}
  </main>

</div><!-- /.layout -->

<!-- ===== Footer ===== -->
{% include footer.html %}

<!-- ===== Mermaid.js ===== -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: 'dark',
    themeVariables: {
      primaryColor:       '#0f172a',
      primaryTextColor:   '#f1f5f9',
      primaryBorderColor: '#334155',
      lineColor:          '#64748b',
      secondaryColor:     '#1e293b',
      tertiaryColor:      '#1e293b',
      background:         '#020617',
      mainBkg:            '#0f172a',
      nodeBorder:         '#334155',
      clusterBkg:         '#0f172a',
      titleColor:         '#34d399',
      edgeLabelBackground:'#1e293b',
      activeTaskBkgColor: '#10b981',
      activeTaskBorderColor: '#34d399',
    },
    flowchart: { curve: 'basis' },
    sequence: {
      actorFontFamily: 'Inter, sans-serif',
      noteFontFamily:  'Inter, sans-serif',
      messageFontFamily: 'Inter, sans-serif',
    },
  });
</script>

<!-- ===== Mobile Sidebar Toggle ===== -->
<script>
(function () {
  var toggle   = document.getElementById('menu-toggle');
  var sidebar  = document.getElementById('site-sidebar');
  var overlay  = document.getElementById('sidebar-overlay');
  var sidebar_toggle_class = 'is-open';
  var overlay_visible_class = 'is-visible';

  if (!toggle || !sidebar || !overlay) return;

  function openSidebar() {
    sidebar.classList.add(sidebar_toggle_class);
    overlay.classList.add(overlay_visible_class);
    toggle.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
  }

  function closeSidebar() {
    sidebar.classList.remove(sidebar_toggle_class);
    overlay.classList.remove(overlay_visible_class);
    toggle.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
  }

  toggle.addEventListener('click', function () {
    if (sidebar.classList.contains(sidebar_toggle_class)) {
      closeSidebar();
    } else {
      openSidebar();
    }
  });

  overlay.addEventListener('click', closeSidebar);

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeSidebar();
  });
}());
</script>

<!-- ===== Active nav highlight ===== -->
<script>
(function () {
  var links = document.querySelectorAll('.nav-link');
  var path  = window.location.pathname;
  links.forEach(function (link) {
    if (link.getAttribute('href') === path ||
        (path.length > 1 && link.getAttribute('href') && path.startsWith(link.getAttribute('href')))) {
      link.classList.add('active');
    }
  });
}());
</script>

</body>
</html>
