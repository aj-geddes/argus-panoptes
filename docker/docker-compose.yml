services:
  argus:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src:cached
      - ../static:/app/static:cached
      - ../config:/app/config:cached
      - ../tests:/app/tests:cached
    environment:
      - ARGUS_CONFIG_PATH=/app/config/argus.yaml
      - ARGUS_DEV_MODE=true
    command: >
      uvicorn argus.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/src

  tailwind:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ..:/app:cached
    command: npx tailwindcss -i static/css/input.css -o static/css/output.css --watch
