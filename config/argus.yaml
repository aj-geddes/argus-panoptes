# config/argus.yaml — LIVE RELOADED ON CHANGE

server:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  log_level: "INFO"

database:
  url: "sqlite+aiosqlite:///./argus.db"
  # url: "postgresql+asyncpg://user:pass@localhost/argus"
  pool_size: 10

ingestion:
  otlp_enabled: true
  otlp_port: 4318
  rest_enabled: true
  max_batch_size: 1000
  flush_interval_seconds: 5

metrics:
  aggregation_windows: ["1m", "5m", "1h", "1d"]
  retention_days: 90
  snapshot_interval_seconds: 60

cost_model:
  providers:
    openai:
      gpt-5.4:          { input: 2.50, output: 10.00 }
      gpt-5.2:          { input: 1.75, output: 14.00 }
      gpt-5.2-pro:      { input: 21.00, output: 168.00 }
      gpt-5:            { input: 1.25, output: 10.00 }
      gpt-5-mini:       { input: 0.25, output: 2.00 }
      gpt-5-nano:       { input: 0.05, output: 0.40 }
      gpt-4.1:          { input: 2.00, output: 8.00 }
      gpt-4.1-mini:     { input: 0.40, output: 1.60 }
      gpt-4.1-nano:     { input: 0.10, output: 0.40 }
      o3:               { input: 10.00, output: 40.00 }
      o4-mini:          { input: 2.00, output: 8.00 }
      gpt-4o:           { input: 2.50, output: 10.00 }
      gpt-4o-mini:      { input: 0.15, output: 0.60 }

    anthropic:
      claude-opus-4-6:    { input: 5.00, output: 25.00 }
      claude-sonnet-4-6:  { input: 3.00, output: 15.00 }
      claude-opus-4-5:    { input: 5.00, output: 25.00 }
      claude-sonnet-4-5:  { input: 3.00, output: 15.00 }
      claude-haiku-4-5:   { input: 1.00, output: 5.00 }
      claude-opus-4-1:    { input: 15.00, output: 75.00 }
      claude-sonnet-4:    { input: 3.00, output: 15.00 }

    google:
      gemini-3.1-pro:       { input: 2.00, output: 12.00 }
      gemini-3-flash:       { input: 0.50, output: 3.00 }
      gemini-2.5-pro:       { input: 1.25, output: 10.00 }
      gemini-2.5-flash:     { input: 0.30, output: 2.50 }
      gemini-2.5-flash-lite: { input: 0.10, output: 0.40 }
      gemini-2.0-flash:     { input: 0.10, output: 0.40 }

    deepseek:
      deepseek-v3.2:    { input: 0.28, output: 0.42 }
      deepseek-r1:      { input: 0.55, output: 2.19 }

    xai:
      grok-4.1:         { input: 0.20, output: 0.50 }
      grok-3:           { input: 3.00, output: 15.00 }

    mistral:
      mistral-large:    { input: 2.00, output: 6.00 }
      mistral-small:    { input: 0.10, output: 0.30 }
      mistral-nemo:     { input: 0.02, output: 0.05 }

    meta:
      llama-4-maverick:  { input: 0.20, output: 0.60 }
      llama-4-scout:     { input: 0.10, output: 0.30 }

alerts:
  enabled: true
  check_interval_seconds: 30
  rules:
    - name: "High error rate"
      condition: "error_rate > 0.10"
      window: "5m"
      severity: "critical"
      notify: ["webhook"]
    - name: "Cost spike"
      condition: "cost_usd_per_hour > 50.00"
      window: "1h"
      severity: "warning"
      notify: ["webhook"]

webhooks:
  - name: "slack-alerts"
    url: "${SLACK_WEBHOOK_URL}"
    events: ["alert.fired", "alert.resolved"]

agents:
  auto_register: true
  default_tags:
    environment: "production"

dashboard:
  refresh_interval_seconds: 5
  default_time_range: "1h"
  charts:
    - type: "token_usage"
      title: "Token consumption"
      position: { row: 1, col: 1, width: 2 }
    - type: "cost_breakdown"
      title: "Cost by agent"
      position: { row: 1, col: 3, width: 1 }
    - type: "latency_percentiles"
      title: "Response latency"
      position: { row: 2, col: 1, width: 1 }
    - type: "error_rate"
      title: "Error rate"
      position: { row: 2, col: 2, width: 1 }
    - type: "tool_success"
      title: "Tool call success"
      position: { row: 2, col: 3, width: 1 }
