{% extends "base.html" %}

{% block title %}Traces{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Page header -->
    <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-white">Traces</h2>
        <div class="text-sm text-slate-400">{{ total }} traces total</div>
    </div>

    <!-- Search and filters -->
    <div class="flex gap-4 items-center">
        <div class="flex-1">
            <input type="search"
                   name="q"
                   value="{{ search }}"
                   hx-get="/traces/search"
                   hx-trigger="input changed delay:300ms, search"
                   hx-target="#trace-results"
                   hx-indicator="#loading"
                   placeholder="Search traces by ID or agent name..."
                   class="bg-slate-800 border border-slate-600 rounded-lg px-4 py-2 w-full text-sm text-white placeholder-slate-500 focus:border-emerald-500 focus:outline-none">
        </div>
        <select name="status"
                hx-get="/traces/search"
                hx-trigger="change"
                hx-target="#trace-results"
                hx-include="[name='q']"
                class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white">
            <option value="">All statuses</option>
            <option value="completed" {% if status_filter == "completed" %}selected{% endif %}>Completed</option>
            <option value="failed" {% if status_filter == "failed" %}selected{% endif %}>Failed</option>
            <option value="running" {% if status_filter == "running" %}selected{% endif %}>Running</option>
            <option value="timeout" {% if status_filter == "timeout" %}selected{% endif %}>Timeout</option>
        </select>
    </div>

    <!-- Trace results -->
    <div id="trace-results">
        {% include 'components/trace_list.html' %}
    </div>
</div>
{% endblock %}
